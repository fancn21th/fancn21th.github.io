<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <!-- Global site tag (gtag.js) - Google Analytics - 开始 -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=UA-150469501-1"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "UA-150469501-1");
    </script>
    <!-- Global site tag (gtag.js) - Google Analytics - 结束 -->
    <title>定位</title>
    <!-- CSS 重置 -->
    <!-- <link rel="stylesheet" href="../assets/reset.css" /> -->
    <!-- 站点样式 -->
    <link rel="stylesheet" href="../assets/site.css" />
    <!-- 外联样式 -->
    <link rel="stylesheet" href="../assets/main.css" />
    <!-- 内联样式 -->
    <style>
      /* 当前页面的样式 */
      #position-float-left-right code {
        background: green;
        border-radius: 5px;
        color: white;
        display: block;
        font: 14px/24px "Source Code Pro", Inconsolata, "Lucida Console",
          Terminal, "Courier New", Courier;
        padding: 24px 15px;
        text-align: center;
      }
      #position-float-left-right .header,
      #position-float-left-right .section,
      #position-float-left-right .aside,
      #position-float-left-right .footer {
        margin: 0 1% 24px 1%;
      }
      #position-float-left-right .section {
        float: left;
        width: 63%;
      }
      #position-float-left-right .aside {
        float: right;
        width: 30%;
      }
      #position-float-left-right .footer {
        clear: both;
        margin-bottom: 0;
      }

      #position-float-multiple-columns code {
        background: green;
        border-radius: 5px;
        color: white;
        display: block;
        font: 14px/24px "Source Code Pro", Inconsolata, "Lucida Console",
          Terminal, "Courier New", Courier;
        padding: 24px 15px;
        text-align: center;
      }
      #position-float-multiple-columns .header,
      #position-float-multiple-columns .section,
      #position-float-multiple-columns .aside,
      #position-float-multiple-columns .footer {
        margin: 0 1% 24px 1%;
      }
      #position-float-multiple-columns .section {
        float: left;
        width: 30%;
      }
      #position-float-multiple-columns .footer {
        clear: both;
        margin-bottom: 0;
      }
    </style>
  </head>
  <body>
    <article id="position-float-left-right" class="fan-sub">
      <h1 class="fan-sub__title">
        左右浮动 Float left&right
      </h1>

      <section class="fan-sub__demo">
        <div class="header">
          <code>&#60;header&#62;</code>
        </div>
        <div class="section">
          <code
            >&#60;section&#62; <br />
            float: left;</code
          >
        </div>
        <div class="aside">
          <code
            >&#60;aside&#62; <br />
            float: right;</code
          >
        </div>
        <div class="footer">
          <code>&#60;footer&#62;</code>
        </div>
      </section>
    </article>

    <article id="position-float-multiple-columns" class="fan-sub">
      <h1 class="fan-sub__title">
        多列浮动 Float multiple columns
      </h1>

      <section class="fan-sub__demo">
        <div class="header">
          <code>&#60;header&#62;</code>
        </div>
        <div class="section">
          <code
            >&#60;section&#62; <br />
            float: left;</code
          >
        </div>
        <div class="section">
          <code
            >&#60;section&#62; <br />
            float: left;</code
          >
        </div>
        <div class="section">
          <code
            >&#60;section&#62; <br />
            float: left;</code
          >
        </div>
        <div class="footer">
          <code>&#60;footer&#62;</code>
        </div>
      </section>
    </article>
  </body>
</html>
