    <title>相对与绝对定位</title>
    <!-- CSS 重置 -->
    <!-- <link rel="stylesheet" href="../assets/reset.css" /> -->
    <!-- 站点样式 -->
    <link rel="stylesheet" href="../assets/site.css" />
    <!-- 外联样式 -->
    <link rel="stylesheet" href="../assets/main.css" />
    <!-- 内联样式 -->
    <style>
      /* 当前页面的样式 */
      /* 相对定位与块元素 */
      #positioning-relative-block div {
        box-sizing: border-box;
        height: 100px;
        width: 100px;
        background: green;
        border-radius: 5px;
        text-align: center;
        padding-top: 44px;
        font-size: 10px;
        margin-bottom: 5px;
      }
      #positioning-relative-block code {
        color: white;
        border: 3px;
      }
      #positioning-relative-block .relative {
        padding-top: 0px;
        border: 3px dashed #dddddd;
        background-color: transparent;
      }
      #positioning-relative-block .relative code {
        box-sizing: inherit;
        position: relative;
        left: 20px;
        top: 20px;
        background-color: red;
        display: block;
        height: 100px;
        border-radius: 5px;
        padding-top: 30px;
      }
      #bar {
      }
    </style>
  </head>
  <body>
    <article id="positioning-relative-block" class="fan-sub">
      <h1 class="fan-sub__title">
        相对定位 与 块级 元素
      </h1>

      <section class="fan-sub__demo">
        <div><code>&#60;div&#62;</code></div>
        <div class="relative">
          <code
            >&#60;div class <br />
            ="relative"&#62;</code
          >
        </div>
        <div><code>&#60;div&#62;</code></div>
      </section>
    </article>

    <article id="bar" class="fan-sub">
      <h1 class="fan-sub__title">
        绝对定位
      </h1>

      <section class="fan-sub__demo">

        numquam est et aperiam.
      </section>
    </article>
  </body>
</html>
