<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>标签转换器</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      .container {
        width: 100%;
      }
      .source,
      .target {
        width: 50%;
        height: 500px;
        display: inline-block;
        vertical-align: top;
      }
      .source {
        background-color: #84a3e8;
      }
      .target {
        background-color: #C7E884;
      }
      .source textarea {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="source">
        <textarea name="message"></textarea>
      </div><!-- remove space
   --><div class="target"></div>
    </div>
  </body>
</html>
